name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build service images (no push)
        run: |
          set -e
          echo "Discovering services with Dockerfile under src/"
          for d in src/*; do
            if [ -f "$d/Dockerfile" ]; then
              svc=$(basename "$d")
              echo "Building $svc"
              docker build -t "${{ github.repository_owner }}/${{ github.event.repository.name }}-$svc:ci-${{ github.run_id }}" -f "$d/Dockerfile" "$d"
            fi
          done
